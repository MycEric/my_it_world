# ============================================================
# My IT World 基础设施 Docker Compose
# 启动：docker compose up -d
# 停止：docker compose down
# 包含：MySQL、Redis、Nacos
# ============================================================
services:
  # MySQL 8.x 数据库
  mysql:
    image: mysql:8.0
    container_name: myit-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: myit_world
      TZ: Asia/Shanghai
    volumes:
      # 初始化 SQL 脚本，容器首次启动时自动执行
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7.x 缓存（Refresh Token、Token 黑名单）
  redis:
    image: redis:7-alpine
    container_name: myit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 2.x 注册中心 + 配置中心（单机模式）
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: myit-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  nacos_data:
